<!DOCTYPE html>
<html lang="en">
<head>

   <meta name="mobile-web-app-capable" content="yes">
   <meta name="theme-color" content="#292a2d">

   <meta name="apple-mobile-web-app-capable" content="yes">

   <meta name="apple-mobile-web-app-status-bar-style" content="#292a2d">

   <title>Lil Baghdad | Iraqi Cuisine</title>
   <link rel="shortcut icon" href="images/favicon.ico">
   <link rel="icon" href="images/icon.png" sizes="192x192">
   <script src="https://kit.fontawesome.com/c555409303.js" defer crossorigin="anonymous"></script>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600&display=swap">
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
      <div class="image-wrapper">
         <img src="images/logo.png" width="140px" height="96px" alt="Lil Baghdad food truck header logo">
      </div>
   </header>
   <nav>
      <ul>
         <li class="appetizers active"><a href="#appetizers" aria-label="Appetizers navigation tab" tabindex="0">Appetizers</a></li>
         <li class="dishes"><a href="#dishes" aria-label="Dishes navigation tab">Dishes</a></li>
         <li class="desserts"><a href="#desserts" aria-label="Desserts navigation tab">Desserts</a></li>
         <li class="drinks"><a href="#drinks" aria-label="Drinks navigation tab">Drinks</a></li>
      </ul>
   </nav>
   <main>
      <section id="appetizers" aria-labelledby="appetizers-section"></section>
      <section id="dishes" aria-labelledby="dishes-section"></section>
      <section id="desserts" aria-labelledby="desserts-section"></section>
      <section id="drinks" aria-labelledby="drinks-section"></section>
   </main>
   <footer>
      <div class="image-wrapper">
         <img src="images/logo.png" width="190px" height="130px" alt="Lil Baghdad food truck footer logo" loading="lazy">
      </div>
      <ul>
         <li><a href="https://www.facebook.com/profile.php?id=100074970285412/" aria-label="Lil Baghdad Facebook link"><i class="fa-brands fa-facebook"></i></a></li>
         <li><a href="https://www.instagram.com/desireddishes/" aria-label="Lil Baghdad Instagram link"><i class="fa-brands fa-instagram"></i></a></li>
         <li><a href="https://maps.app.goo.gl/xj666i6ocinxPxfS9" aria-label="Lil Baghdad Google link"><i class="fa-brands fa-google"></i></a></li>
         <li><a href="tel:(512)-300-9655" aria-label="Lil Baghdad Telephone Number link"><i class="fa-solid fa-phone"></i></a></li>
      </ul>
      <p>&copy; 2022 Jeffrey Claybrook</p>
   </footer>
   <aside class="hidden">
      <div class="modal-inner">
         <div class="modal-header">
            <img>
            <button class="close-btn" aria-label="Close modal window"><i class="fa-solid fa-xmark"></i></button>
         </div>
         <div class="modal-body">
            <h3></h3>
            <p></p>
            <h4></h4>
         </div>
      </div>
   </aside>
   <script src="script.js"></script>
